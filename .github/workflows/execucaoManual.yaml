# nome da pipeline
name: "Execução Manual"

on:
    workflow_dispatch:

jobs:
    #nome do job
    e2e-tests:
        # maquina onde o job vai rodar
        runs-on: ubuntu-24.04

        # passos do job
        steps:
            # clone do projeto
            - uses: actions/checkout@v7

            # instalção do node
            - uses: actions/setup-node@v4
              with:
                  node-version: 24.x
            
            - name: Install NPM Dependencies
              run: npm ci

            - name: Install Browser Binaries
              run: npx playwright install --with-deps

            # instalação do Mocha            
            - name: Instalando Mocha
              run: npm install -g mocha
            
            # Intalando Mocha JUnit Reporter
            - name: Instalando Mocha JUnit Reporter
              run: npm install -g mocha-junit-reporter
            
            # Executando testes
            - name: Executando testes
              run: npm test

            # Salvando o XML no GitHub para você conseguir baixar depois
            - name: Salvar relatório como artefato
              uses: actions/upload-artifact@v4
              if: always() # Rodar mesmo se algum teste falhar
              with:
                name: resultados-dos-testes
                path: test-results.xml

            - name: Publicar Resumo dos Testes na aba Summary
              uses: test-summary/action@v2
              with:
                paths: 'test-results.xml' # O caminho exato do arquivo gerado pelo Mocha
              if: always() # GARANTE que o resumo seja publicado mesmo se algum teste falhar